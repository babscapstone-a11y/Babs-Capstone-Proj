ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        # Laravel front-controller rewrites (inline so they work even if .htaccess is skipped)
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [L]
    </Directory>

    # Send Apache logs to stdout/stderr so Railway captures them
    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
