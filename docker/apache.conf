ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Send Apache logs to stdout/stderr so Railway captures them
    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
